<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Weather</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0a0e14;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    position: relative;
  }

  /* FULL-BLEED PHOTO BACKGROUND */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: background-image 0.8s ease;
    z-index: 0;
  }

  /* DARK GRADIENT OVERLAY — makes foreground always readable */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(10, 14, 20, 0.55) 0%,
        rgba(10, 14, 20, 0.25) 35%,
        rgba(10, 14, 20, 0.45) 70%,
        rgba(10, 14, 20, 0.85) 100%);
  }

  /* CONTENT LAYER */
  .wrap {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    padding: 4vmin 5vmin 4vmin 5vmin;
  }

  /* TOP STRIP — brand left, clock right */
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4vmin;
  }
  .brand {
    font-size: 1.5vmin;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 0.2vmin 0.6vmin rgba(0,0,0,0.6);
  }
  .clock {
    font-size: 2.2vmin;
    color: rgba(255,255,255,0.9);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    text-shadow: 0 0.2vmin 0.6vmin rgba(0,0,0,0.6);
  }

  /* HERO ZONE — temp + condition */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 2vmin;
  }
  .temp-row {
    display: flex;
    align-items: flex-start;
    gap: 2vmin;
    margin-bottom: 1vmin;
  }
  .temp {
    font-size: 28vmin;
    font-weight: 200;
    line-height: 0.85;
    letter-spacing: -0.04em;
    text-shadow: 0 0.6vmin 2vmin rgba(0,0,0,0.5);
  }
  .temp .unit {
    font-size: 9vmin;
    color: rgba(255,255,255,0.75);
    font-weight: 300;
    margin-left: 0.4vmin;
    vertical-align: top;
  }
  .icon-wrap {
    margin-top: 4vmin;
    width: 14vmin;
    height: 14vmin;
    flex-shrink: 0;
    filter: drop-shadow(0 0.4vmin 1.2vmin rgba(0,0,0,0.5));
  }
  .icon-wrap svg { width: 100%; height: 100%; }

  .condition {
    font-size: 3.5vmin;
    margin-top: 1vmin;
    font-weight: 400;
    letter-spacing: -0.005em;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 0.2vmin 0.6vmin rgba(0,0,0,0.5);
  }

  /* GLASSMORPHIC PILLS — floating, not a panel */
  .pills {
    display: flex;
    gap: 1.4vmin;
    margin-top: 4vmin;
    flex-wrap: wrap;
  }
  .pill {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 1.5vmin;
    padding: 1.6vmin 2.4vmin;
    min-width: 14vmin;
  }
  .pill .pill-label {
    font-size: 1.3vmin;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 0.6vmin;
  }
  .pill .pill-value {
    font-size: 3vmin;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.95);
  }
  .pill .pill-value .small {
    font-size: 1.6vmin;
    color: rgba(255,255,255,0.65);
    margin-left: 0.3vmin;
  }

  /* HOURLY STRIP — baseline detail row */
  .hourly {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 0;
    padding: 2vmin 0 0 0;
    margin-top: 3vmin;
    border-top: 1px solid rgba(255,255,255,0.18);
  }
  .hour {
    text-align: center;
    padding: 0.5vmin 0;
  }
  .hour .h-time {
    font-size: 1.3vmin;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 0.8vmin;
  }
  .hour .h-icon {
    width: 3vmin;
    height: 3vmin;
    margin: 0 auto 0.6vmin auto;
    opacity: 0.9;
  }
  .hour .h-icon svg { width: 100%; height: 100%; }
  .hour .h-temp {
    font-size: 2vmin;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.95);
  }
  .hour .h-rain {
    font-size: 1.1vmin;
    color: #79c0ff;
    margin-top: 0.4vmin;
    letter-spacing: 0.05em;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0e14;
    color: #484f58;
    font-size: 2vmin;
    z-index: 100;
  }
  .loading.hidden { display: none; }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="wrap">
  <header>
    <div class="brand">UBC Vancouver Campus · Current Conditions</div>
    <div class="clock" id="clock">--:--</div>
  </header>

  <div class="hero">
    <div class="temp-row">
      <div class="temp" id="temp">--<span class="unit">°C</span></div>
      <div class="icon-wrap" id="icon-wrap"></div>
    </div>
    <div class="condition" id="condition">—</div>

    <div class="pills" id="pills"></div>
  </div>

  <div class="hourly" id="hourly"></div>
</div>

<div class="loading" id="loading">Loading weather…</div>

<!-- SVG ICON LIBRARY — line-style, white -->
<svg style="display:none">
  <defs>
    <!-- SUNNY -->
    <symbol id="ic-sunny" viewBox="0 0 100 100">
      <g fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
        <circle cx="50" cy="50" r="14" fill="currentColor" stroke="none"/>
        <line x1="50" y1="6"  x2="50" y2="20"/>
        <line x1="50" y1="80" x2="50" y2="94"/>
        <line x1="6"  y1="50" x2="20" y2="50"/>
        <line x1="80" y1="50" x2="94" y2="50"/>
        <line x1="18" y1="18" x2="28" y2="28"/>
        <line x1="72" y1="72" x2="82" y2="82"/>
        <line x1="82" y1="18" x2="72" y2="28"/>
        <line x1="28" y1="72" x2="18" y2="82"/>
      </g>
    </symbol>

    <!-- CLOUDY -->
    <symbol id="ic-cloudy" viewBox="0 0 100 100">
      <g fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round">
        <path d="M28 70 Q14 70 14 56 Q14 44 26 42 Q28 28 44 28 Q60 28 64 42 Q80 42 80 56 Q80 70 66 70 Z"
              fill="currentColor" fill-opacity="0.95" stroke="none"/>
      </g>
    </symbol>

    <!-- PARTLY CLOUDY -->
    <symbol id="ic-partly" viewBox="0 0 100 100">
      <g fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
        <circle cx="32" cy="34" r="10" fill="currentColor" stroke="none"/>
        <line x1="32" y1="14" x2="32" y2="20"/>
        <line x1="12" y1="34" x2="18" y2="34"/>
        <line x1="46" y1="34" x2="52" y2="34"/>
        <line x1="18" y1="20" x2="22" y2="24"/>
        <line x1="42" y1="20" x2="46" y2="24"/>
      </g>
      <path d="M38 76 Q24 76 24 64 Q24 54 34 52 Q36 42 50 42 Q64 42 68 54 Q80 54 80 64 Q80 76 68 76 Z"
            fill="currentColor" fill-opacity="0.95"/>
    </symbol>

    <!-- FOG -->
    <symbol id="ic-fog" viewBox="0 0 100 100">
      <g fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
        <line x1="14" y1="38" x2="86" y2="38"/>
        <line x1="20" y1="52" x2="80" y2="52"/>
        <line x1="14" y1="66" x2="74" y2="66"/>
        <line x1="22" y1="80" x2="86" y2="80"/>
      </g>
    </symbol>

    <!-- RAIN -->
    <symbol id="ic-rain" viewBox="0 0 100 100">
      <path d="M28 56 Q14 56 14 44 Q14 34 24 32 Q26 20 42 20 Q58 20 62 32 Q78 32 78 44 Q78 56 64 56 Z"
            fill="currentColor" fill-opacity="0.95"/>
      <g fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
        <line x1="30" y1="66" x2="26" y2="80"/>
        <line x1="46" y1="66" x2="42" y2="80"/>
        <line x1="62" y1="66" x2="58" y2="80"/>
      </g>
    </symbol>

    <!-- HEAVY RAIN -->
    <symbol id="ic-rain-heavy" viewBox="0 0 100 100">
      <path d="M28 50 Q14 50 14 38 Q14 28 24 26 Q26 14 42 14 Q58 14 62 26 Q78 26 78 38 Q78 50 64 50 Z"
            fill="currentColor" fill-opacity="0.95"/>
      <g fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
        <line x1="24" y1="60" x2="20" y2="76"/>
        <line x1="36" y1="60" x2="32" y2="78"/>
        <line x1="48" y1="60" x2="44" y2="76"/>
        <line x1="60" y1="60" x2="56" y2="78"/>
        <line x1="72" y1="60" x2="68" y2="76"/>
      </g>
    </symbol>

    <!-- DRIZZLE -->
    <symbol id="ic-drizzle" viewBox="0 0 100 100">
      <path d="M28 56 Q14 56 14 44 Q14 34 24 32 Q26 20 42 20 Q58 20 62 32 Q78 32 78 44 Q78 56 64 56 Z"
            fill="currentColor" fill-opacity="0.95"/>
      <g fill="currentColor">
        <circle cx="30" cy="74" r="2"/>
        <circle cx="46" cy="74" r="2"/>
        <circle cx="62" cy="74" r="2"/>
        <circle cx="38" cy="84" r="2"/>
        <circle cx="54" cy="84" r="2"/>
      </g>
    </symbol>

    <!-- SNOW -->
    <symbol id="ic-snow" viewBox="0 0 100 100">
      <path d="M28 50 Q14 50 14 38 Q14 28 24 26 Q26 14 42 14 Q58 14 62 26 Q78 26 78 38 Q78 50 64 50 Z"
            fill="currentColor" fill-opacity="0.95"/>
      <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <g transform="translate(28 72)"><line x1="-6" y1="0" x2="6" y2="0"/><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-4" y1="-4" x2="4" y2="4"/><line x1="-4" y1="4" x2="4" y2="-4"/></g>
        <g transform="translate(50 80)"><line x1="-6" y1="0" x2="6" y2="0"/><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-4" y1="-4" x2="4" y2="4"/><line x1="-4" y1="4" x2="4" y2="-4"/></g>
        <g transform="translate(72 72)"><line x1="-6" y1="0" x2="6" y2="0"/><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-4" y1="-4" x2="4" y2="4"/><line x1="-4" y1="4" x2="4" y2="-4"/></g>
      </g>
    </symbol>

    <!-- THUNDERSTORM -->
    <symbol id="ic-thunder" viewBox="0 0 100 100">
      <path d="M28 50 Q14 50 14 38 Q14 28 24 26 Q26 14 42 14 Q58 14 62 26 Q78 26 78 38 Q78 50 64 50 Z"
            fill="currentColor" fill-opacity="0.95"/>
      <path d="M48 56 L36 76 L48 76 L42 92 L60 70 L48 70 L54 56 Z"
            fill="#ffd34d" stroke="none"/>
    </symbol>
  </defs>
</svg>

<script>
const LAT = 49.2606;
const LON = -123.2460;   // UBC Vancouver campus
const RELOAD_MS = 15 * 60 * 1000;

// Map WMO weather codes → { label, icon (SVG id), bg (image bucket) }
const WX = {
  0:  { label: 'Clear',                icon: 'ic-sunny',      bg: 'sunny' },
  1:  { label: 'Mainly Clear',         icon: 'ic-sunny',      bg: 'sunny' },
  2:  { label: 'Partly Cloudy',        icon: 'ic-partly',     bg: 'cloudy' },
  3:  { label: 'Overcast',             icon: 'ic-cloudy',     bg: 'cloudy' },
  45: { label: 'Fog',                  icon: 'ic-fog',        bg: 'fog' },
  48: { label: 'Freezing Fog',         icon: 'ic-fog',        bg: 'fog' },
  51: { label: 'Light Drizzle',        icon: 'ic-drizzle',    bg: 'drizzle' },
  53: { label: 'Drizzle',              icon: 'ic-drizzle',    bg: 'drizzle' },
  55: { label: 'Heavy Drizzle',        icon: 'ic-rain',       bg: 'drizzle' },
  56: { label: 'Freezing Drizzle',     icon: 'ic-rain',       bg: 'freezing-rain' },
  57: { label: 'Freezing Drizzle',     icon: 'ic-rain',       bg: 'freezing-rain' },
  61: { label: 'Light Rain',           icon: 'ic-rain',       bg: 'rain-light' },
  63: { label: 'Rain',                 icon: 'ic-rain',       bg: 'rain' },
  65: { label: 'Heavy Rain',           icon: 'ic-rain-heavy', bg: 'rain-heavy' },
  66: { label: 'Freezing Rain',        icon: 'ic-rain',       bg: 'freezing-rain' },
  67: { label: 'Freezing Rain',        icon: 'ic-rain',       bg: 'freezing-rain' },
  71: { label: 'Light Snow',           icon: 'ic-snow',       bg: 'snow-light' },
  73: { label: 'Snow',                 icon: 'ic-snow',       bg: 'snow' },
  75: { label: 'Heavy Snow',           icon: 'ic-snow',       bg: 'snow-heavy' },
  77: { label: 'Snow Grains',          icon: 'ic-snow',       bg: 'snow' },
  80: { label: 'Light Showers',        icon: 'ic-rain',       bg: 'rain-light' },
  81: { label: 'Showers',              icon: 'ic-rain',       bg: 'rain' },
  82: { label: 'Heavy Showers',        icon: 'ic-rain-heavy', bg: 'rain-heavy' },
  85: { label: 'Snow Showers',         icon: 'ic-snow',       bg: 'snow' },
  86: { label: 'Heavy Snow Showers',   icon: 'ic-snow',       bg: 'snow-heavy' },
  95: { label: 'Thunderstorm',         icon: 'ic-thunder',    bg: 'thunderstorm' },
  96: { label: 'Thunderstorm + Hail',  icon: 'ic-thunder',    bg: 'thunderstorm' },
  99: { label: 'Severe Thunderstorm',  icon: 'ic-thunder',    bg: 'thunderstorm' },
};

// Background images per bucket (Unsplash placeholders, swap with your own)
const BG_IMAGES = {
  'sunny':         'https://images.unsplash.com/photo-1601297183305-6df142704ea2?w=2400&q=80',
  'cloudy':        'https://images.unsplash.com/photo-1499346030926-9a72daac6c63?w=2400&q=80',
  'fog':           'https://images.unsplash.com/photo-1487621167305-5d248087c724?w=2400&q=80',
  'drizzle':       'https://images.unsplash.com/photo-1438449805896-28a666819a20?w=2400&q=80',
  'rain-light':    'https://images.unsplash.com/photo-1519692933481-e162a57d6721?w=2400&q=80',
  'rain':          'https://images.unsplash.com/photo-1428592953211-077101b2021b?w=2400&q=80',
  'rain-heavy':    'https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?w=2400&q=80',
  'freezing-rain': 'https://images.unsplash.com/photo-1457269449834-928af64c684d?w=2400&q=80',
  'snow-light':    'https://images.unsplash.com/photo-1547500818-faecf76e5a64?w=2400&q=80',
  'snow':          'https://images.unsplash.com/photo-1518931412505-5c6c5a02a89c?w=2400&q=80',
  'snow-heavy':    'https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=2400&q=80',
  'thunderstorm':  'https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?w=2400&q=80',
};

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${LAT}&longitude=${LON}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,`
      + `weather_code,wind_speed_10m,wind_direction_10m,precipitation,is_day`
      + `&hourly=temperature_2m,weather_code,precipitation_probability`
      + `&forecast_days=2`
      + `&timezone=America%2FVancouver`;

    const res = await fetch(url);
    const data = await res.json();
    render(data);
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    console.error('Weather load failed:', e);
    document.getElementById('loading').textContent = 'Unable to load weather.';
  }
}

function render(data) {
  const c = data.current;
  const code = c.weather_code;
  const wx = WX[code] || { label: 'Conditions', icon: 'ic-cloudy', bg: 'cloudy' };

  // Background
  const bgUrl = BG_IMAGES[wx.bg] || BG_IMAGES['cloudy'];
  document.getElementById('bg').style.backgroundImage = `url('${bgUrl}')`;

  // Temp + condition
  document.getElementById('temp').innerHTML =
    `${Math.round(c.temperature_2m)}<span class="unit">°C</span>`;
  document.getElementById('icon-wrap').innerHTML =
    `<svg><use href="#${wx.icon}"/></svg>`;
  document.getElementById('condition').textContent = wx.label;

  // Pills — floating, not a panel
  const windDir = degreesToCompass(c.wind_direction_10m);
  document.getElementById('pills').innerHTML = `
    <div class="pill">
      <div class="pill-label">Feels Like</div>
      <div class="pill-value">${Math.round(c.apparent_temperature)}<span class="small">°C</span></div>
    </div>
    <div class="pill">
      <div class="pill-label">Humidity</div>
      <div class="pill-value">${Math.round(c.relative_humidity_2m)}<span class="small">%</span></div>
    </div>
    <div class="pill">
      <div class="pill-label">Wind</div>
      <div class="pill-value">${Math.round(c.wind_speed_10m)}<span class="small"> km/h ${windDir}</span></div>
    </div>
    <div class="pill">
      <div class="pill-label">Precipitation</div>
      <div class="pill-value">${(c.precipitation || 0).toFixed(1)}<span class="small"> mm</span></div>
    </div>
  `;

  // Hourly strip
  const now = new Date();
  const hourly = data.hourly;
  const times = hourly.time;
  let startIdx = 0;
  for (let i = 0; i < times.length; i++) {
    if (new Date(times[i]) >= now) { startIdx = i; break; }
  }
  const slice = times.slice(startIdx, startIdx + 12);
  let html = '';
  for (let i = 0; i < slice.length; i++) {
    const idx = startIdx + i;
    const t = new Date(times[idx]);
    const hourWx = WX[hourly.weather_code[idx]] || { icon: 'ic-cloudy' };
    const pop = hourly.precipitation_probability[idx];
    html += `
      <div class="hour">
        <div class="h-time">${t.toLocaleTimeString('en-CA', {hour: 'numeric'})}</div>
        <div class="h-icon"><svg><use href="#${hourWx.icon}"/></svg></div>
        <div class="h-temp">${Math.round(hourly.temperature_2m[idx])}°</div>
        ${pop >= 20 ? `<div class="h-rain">${pop}%</div>` : ''}
      </div>
    `;
  }
  document.getElementById('hourly').innerHTML = html;
}

function degreesToCompass(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
}

loadWeather();
updateClock();
setInterval(loadWeather, RELOAD_MS);
setInterval(updateClock, 30000);
</script>
</body>
</html>
