<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Weather</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    position: relative;
  }

  /* Background image / vignette */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: background-image 0.8s ease;
  }
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
      rgba(13, 17, 23, 0.55) 0%,
      rgba(13, 17, 23, 0.35) 40%,
      rgba(13, 17, 23, 0.85) 100%);
  }

  /* Layout — hero top, hourly bottom */
  .wrap {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 5vh 5vw 4vh 5vw;
    z-index: 2;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4vh;
  }
  .subhead {
    font-size: 0.85vw;
    color: #c9d1d9;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.5vh;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }
  .heading {
    font-size: 2vw;
    font-weight: 500;
    letter-spacing: -0.01em;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }
  .clock {
    font-size: 1.3vw;
    color: #c9d1d9;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }

  /* Hero — current */
  .hero {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 3vw;
    min-height: 0;
  }
  .temp-block {
    text-align: left;
  }
  .temp {
    font-size: 18vw;
    font-weight: 200;
    line-height: 0.85;
    letter-spacing: -0.04em;
    text-shadow: 0 0.3vw 1vw rgba(0,0,0,0.4);
  }
  .temp .unit {
    font-size: 5vw;
    color: #c9d1d9;
    font-weight: 300;
    margin-left: 0.5vw;
    vertical-align: top;
  }
  .condition {
    font-size: 2.4vw;
    margin-top: 2vh;
    font-weight: 400;
    letter-spacing: -0.01em;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }

  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3vh 3vw;
    align-self: end;
    padding-bottom: 4vh;
  }
  .detail-item .label {
    font-size: 0.8vw;
    color: #c9d1d9;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 0.7vh;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }
  .detail-item .value {
    font-size: 2.2vw;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }
  .detail-item .value .small {
    font-size: 1.3vw;
    color: #c9d1d9;
    margin-left: 0.3vw;
  }

  /* Hourly strip */
  .hourly {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 0.8vw;
    padding-top: 3vh;
    border-top: 1px solid rgba(230, 237, 243, 0.2);
  }
  .hour {
    text-align: center;
    padding: 0.5vh 0;
  }
  .hour .h-time {
    font-size: 0.85vw;
    color: #c9d1d9;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1vh;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }
  .hour .h-icon {
    font-size: 1.6vw;
    margin: 0.5vh 0;
    line-height: 1;
  }
  .hour .h-temp {
    font-size: 1.3vw;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0.1vw 0.3vw rgba(0,0,0,0.6);
  }
  .hour .h-rain {
    font-size: 0.75vw;
    color: #79c0ff;
    margin-top: 0.4vh;
    letter-spacing: 0.05em;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    color: #484f58;
    font-size: 1.5vw;
    z-index: 100;
  }
  .loading.hidden { display: none; }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="wrap">
  <header>
    <div>
      <div class="subhead">Current Conditions</div>
      <div class="heading">UBC Vancouver Campus</div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </header>

  <div class="hero">
    <div class="temp-block">
      <div class="temp" id="temp">--<span class="unit">°C</span></div>
      <div class="condition" id="condition">—</div>
    </div>
    <div class="details" id="details"></div>
  </div>

  <div class="hourly" id="hourly"></div>
</div>

<div class="loading" id="loading">Loading weather…</div>

<script>
const LAT = 49.2606;
const LON = -123.2460;   // UBC Vancouver campus
const RELOAD_MS = 15 * 60 * 1000;   // every 15 min

// Open-Meteo WMO weather code → human label + emoji icon + background bucket
// 12 background buckets: sunny, cloudy, fog, drizzle, freezing-rain,
//                        rain-light, rain, rain-heavy, snow-light, snow, snow-heavy, thunderstorm
const WX = {
  0:  { label: 'Clear',                icon: '☀️',  bg: 'sunny' },
  1:  { label: 'Mainly Clear',         icon: '🌤',   bg: 'sunny' },
  2:  { label: 'Partly Cloudy',        icon: '⛅️',  bg: 'cloudy' },
  3:  { label: 'Overcast',             icon: '☁️',  bg: 'cloudy' },
  45: { label: 'Fog',                  icon: '🌫',   bg: 'fog' },
  48: { label: 'Freezing Fog',         icon: '🌫',   bg: 'fog' },
  51: { label: 'Light Drizzle',        icon: '🌦',   bg: 'drizzle' },
  53: { label: 'Drizzle',              icon: '🌦',   bg: 'drizzle' },
  55: { label: 'Heavy Drizzle',        icon: '🌧',   bg: 'drizzle' },
  56: { label: 'Freezing Drizzle',     icon: '🌨',   bg: 'freezing-rain' },
  57: { label: 'Freezing Drizzle',     icon: '🌨',   bg: 'freezing-rain' },
  61: { label: 'Light Rain',           icon: '🌧',   bg: 'rain-light' },
  63: { label: 'Rain',                 icon: '🌧',   bg: 'rain' },
  65: { label: 'Heavy Rain',           icon: '🌧',   bg: 'rain-heavy' },
  66: { label: 'Freezing Rain',        icon: '🌨',   bg: 'freezing-rain' },
  67: { label: 'Freezing Rain',        icon: '🌨',   bg: 'freezing-rain' },
  71: { label: 'Light Snow',           icon: '🌨',   bg: 'snow-light' },
  73: { label: 'Snow',                 icon: '❄️',  bg: 'snow' },
  75: { label: 'Heavy Snow',           icon: '❄️',  bg: 'snow-heavy' },
  77: { label: 'Snow Grains',          icon: '❄️',  bg: 'snow' },
  80: { label: 'Light Showers',        icon: '🌦',   bg: 'rain-light' },
  81: { label: 'Showers',              icon: '🌧',   bg: 'rain' },
  82: { label: 'Heavy Showers',        icon: '⛈',   bg: 'rain-heavy' },
  85: { label: 'Snow Showers',         icon: '🌨',   bg: 'snow' },
  86: { label: 'Heavy Snow Showers',   icon: '🌨',   bg: 'snow-heavy' },
  95: { label: 'Thunderstorm',         icon: '⛈',   bg: 'thunderstorm' },
  96: { label: 'Thunderstorm + Hail',  icon: '⛈',   bg: 'thunderstorm' },
  99: { label: 'Severe Thunderstorm',  icon: '⛈',   bg: 'thunderstorm' },
};

// Background images per bucket — Unsplash, no key needed for direct file URLs.
// We host them as direct image URLs. You can swap any of these for your own
// images by replacing the URL.
const BG_IMAGES = {
  'sunny':         'https://images.unsplash.com/photo-1601297183305-6df142704ea2?w=2400&q=80',
  'cloudy':        'https://images.unsplash.com/photo-1499346030926-9a72daac6c63?w=2400&q=80',
  'fog':           'https://images.unsplash.com/photo-1487621167305-5d248087c724?w=2400&q=80',
  'drizzle':       'https://images.unsplash.com/photo-1438449805896-28a666819a20?w=2400&q=80',
  'rain-light':    'https://images.unsplash.com/photo-1519692933481-e162a57d6721?w=2400&q=80',
  'rain':          'https://images.unsplash.com/photo-1428592953211-077101b2021b?w=2400&q=80',
  'rain-heavy':    'https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?w=2400&q=80',
  'freezing-rain': 'https://images.unsplash.com/photo-1457269449834-928af64c684d?w=2400&q=80',
  'snow-light':    'https://images.unsplash.com/photo-1547500818-faecf76e5a64?w=2400&q=80',
  'snow':          'https://images.unsplash.com/photo-1518931412505-5c6c5a02a89c?w=2400&q=80',
  'snow-heavy':    'https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=2400&q=80',
  'thunderstorm':  'https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?w=2400&q=80',
};

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${LAT}&longitude=${LON}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,`
      + `weather_code,wind_speed_10m,wind_direction_10m,precipitation,is_day`
      + `&hourly=temperature_2m,weather_code,precipitation_probability`
      + `&forecast_days=2`
      + `&timezone=America%2FVancouver`;

    const res = await fetch(url);
    const data = await res.json();
    render(data);
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    console.error('Weather load failed:', e);
    document.getElementById('loading').textContent = 'Unable to load weather.';
  }
}

function render(data) {
  const c = data.current;
  const code = c.weather_code;
  const wx = WX[code] || { label: 'Conditions', icon: '🌡', bg: 'cloudy' };

  // Background
  const bgUrl = BG_IMAGES[wx.bg] || BG_IMAGES['cloudy'];
  document.getElementById('bg').style.backgroundImage = `url('${bgUrl}')`;

  // Temperature
  document.getElementById('temp').innerHTML =
    `${Math.round(c.temperature_2m)}<span class="unit">°C</span>`;
  document.getElementById('condition').textContent =
    `${wx.icon}  ${wx.label}`;

  // Details panel
  const windDir = degreesToCompass(c.wind_direction_10m);
  document.getElementById('details').innerHTML = `
    <div class="detail-item">
      <div class="label">Feels Like</div>
      <div class="value">${Math.round(c.apparent_temperature)}<span class="small">°C</span></div>
    </div>
    <div class="detail-item">
      <div class="label">Humidity</div>
      <div class="value">${Math.round(c.relative_humidity_2m)}<span class="small">%</span></div>
    </div>
    <div class="detail-item">
      <div class="label">Wind</div>
      <div class="value">${Math.round(c.wind_speed_10m)}<span class="small"> km/h ${windDir}</span></div>
    </div>
    <div class="detail-item">
      <div class="label">Precipitation</div>
      <div class="value">${(c.precipitation || 0).toFixed(1)}<span class="small"> mm</span></div>
    </div>
  `;

  // Hourly strip — next 12 hours from now
  const now = new Date();
  const hourly = data.hourly;
  const times = hourly.time;
  let startIdx = 0;
  for (let i = 0; i < times.length; i++) {
    if (new Date(times[i]) >= now) { startIdx = i; break; }
  }
  const slice = times.slice(startIdx, startIdx + 12);
  let html = '';
  for (let i = 0; i < slice.length; i++) {
    const idx = startIdx + i;
    const t = new Date(times[idx]);
    const hourWx = WX[hourly.weather_code[idx]] || { icon: '🌡' };
    const pop = hourly.precipitation_probability[idx];
    html += `
      <div class="hour">
        <div class="h-time">${t.toLocaleTimeString('en-CA', {hour: 'numeric'})}</div>
        <div class="h-icon">${hourWx.icon}</div>
        <div class="h-temp">${Math.round(hourly.temperature_2m[idx])}°</div>
        ${pop >= 20 ? `<div class="h-rain">${pop}%</div>` : ''}
      </div>
    `;
  }
  document.getElementById('hourly').innerHTML = html;
}

function degreesToCompass(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
}

loadWeather();
updateClock();
setInterval(loadWeather, RELOAD_MS);
setInterval(updateClock, 30000);
</script>
</body>
</html>
