<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Weather</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0a0e14;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    position: relative;
  }

  /* FULL-BLEED PHOTO BACKGROUND */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: background-image 0.8s ease;
    z-index: 0;
  }

  /* DARK GRADIENT OVERLAY — makes foreground always readable */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(10, 14, 20, 0.55) 0%,
        rgba(10, 14, 20, 0.25) 35%,
        rgba(10, 14, 20, 0.45) 70%,
        rgba(10, 14, 20, 0.85) 100%);
  }

  /* CONTENT LAYER */
  .wrap {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    padding: 4vmin 5vmin 4vmin 5vmin;
  }

  /* TOP STRIP — brand left, clock right */
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4vmin;
  }
  .brand {
    font-size: 1.5vmin;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 0.2vmin 0.6vmin rgba(0,0,0,0.6);
  }
  .clock {
    font-size: 2.2vmin;
    color: rgba(255,255,255,0.9);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    text-shadow: 0 0.2vmin 0.6vmin rgba(0,0,0,0.6);
  }

  /* HERO ZONE — temp + condition */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 2vmin;
  }
  .temp-row {
    display: flex;
    align-items: flex-start;
    gap: 2vmin;
    margin-bottom: 1vmin;
  }
  .temp {
    font-size: 28vmin;
    font-weight: 200;
    line-height: 0.85;
    letter-spacing: -0.04em;
    text-shadow: 0 0.6vmin 2vmin rgba(0,0,0,0.5);
  }
  .temp .unit {
    font-size: 9vmin;
    color: rgba(255,255,255,0.75);
    font-weight: 300;
    margin-left: 0.4vmin;
    vertical-align: top;
  }
  .icon-wrap {
    margin-top: 4vmin;
    width: 16vmin;
    height: 16vmin;
    flex-shrink: 0;
    filter: drop-shadow(0 0.4vmin 1.2vmin rgba(0,0,0,0.4));
  }
  .icon-wrap img { width: 100%; height: 100%; display: block; }

  .condition {
    font-size: 4.5vmin;
    margin-top: 2vmin;
    font-weight: 400;
    letter-spacing: -0.005em;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 0.2vmin 0.6vmin rgba(0,0,0,0.5);
  }

  /* GLASSMORPHIC PILLS — floating, not a panel */
  .pills {
    display: flex;
    gap: 1.4vmin;
    margin-top: 4vmin;
    flex-wrap: wrap;
  }
  .pill {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 1.5vmin;
    padding: 1.6vmin 2.4vmin;
    min-width: 14vmin;
  }
  .pill .pill-label {
    font-size: 1.6vmin;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 0.6vmin;
  }
  .pill .pill-value {
    font-size: 3vmin;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.95);
  }
  .pill .pill-value .small {
    font-size: 1.6vmin;
    color: rgba(255,255,255,0.65);
    margin-left: 0.3vmin;
  }

  /* HOURLY STRIP — baseline detail row */
  .hourly {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 0;
    padding: 2vmin 0 0 0;
    margin-top: 3vmin;
    border-top: 1px solid rgba(255,255,255,0.18);
  }
  .hour {
    text-align: center;
    padding: 0.5vmin 0;
  }
  .hour .h-time {
    font-size: 1.6vmin;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1vmin;
  }
  .hour .h-icon {
    width: 5vmin;
    height: 5vmin;
    margin: 0 auto 0.8vmin auto;
    opacity: 0.98;
  }
  .hour .h-icon img { width: 100%; height: 100%; display: block; }
  .hour .h-temp {
    font-size: 2.6vmin;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: rgba(255,255,255,0.98);
  }
  .hour .h-rain {
    font-size: 1.3vmin;
    color: #79c0ff;
    margin-top: 0.4vmin;
    letter-spacing: 0.05em;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0e14;
    color: #484f58;
    font-size: 2vmin;
    z-index: 100;
  }
  .loading.hidden { display: none; }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="wrap">
  <header>
    <div class="brand">UBC Vancouver Campus · Current Conditions</div>
    <div class="clock" id="clock">--:--</div>
  </header>

  <div class="hero">
    <div class="temp-row">
      <div class="temp" id="temp">--<span class="unit">°C</span></div>
      <div class="icon-wrap" id="icon-wrap"></div>
    </div>
    <div class="condition" id="condition">—</div>

    <div class="pills" id="pills"></div>
  </div>

  <div class="hourly" id="hourly"></div>
</div>

<div class="loading" id="loading">Loading weather…</div>

<!-- Meteocons icons loaded from jsDelivr CDN at render time -->

<script>
const LAT = 49.2606;
const LON = -123.2460;   // UBC Vancouver campus
const RELOAD_MS = 15 * 60 * 1000;

// Meteocons base URL (jsDelivr CDN, animated fill style)
// Each icon is a self-contained animated SVG.
const ICON_BASE = 'https://cdn.jsdelivr.net/npm/@bybas/weather-icons/production/fill/all';

// Map WMO weather codes → { label, icon (day), icon_night (optional), bg }
// Icon names follow Meteocons naming. If icon_night is set, it's used at night.
const WX = {
  0:  { label: 'Clear',                icon: 'clear-day',                  icon_night: 'clear-night',                  bg: 'sunny' },
  1:  { label: 'Mainly Clear',         icon: 'clear-day',                  icon_night: 'clear-night',                  bg: 'sunny' },
  2:  { label: 'Partly Cloudy',        icon: 'partly-cloudy-day',          icon_night: 'partly-cloudy-night',          bg: 'cloudy' },
  3:  { label: 'Overcast',             icon: 'overcast-day',               icon_night: 'overcast-night',               bg: 'cloudy' },
  45: { label: 'Fog',                  icon: 'fog-day',                    icon_night: 'fog-night',                    bg: 'fog' },
  48: { label: 'Freezing Fog',         icon: 'fog-day',                    icon_night: 'fog-night',                    bg: 'fog' },
  51: { label: 'Light Drizzle',        icon: 'partly-cloudy-day-drizzle',  icon_night: 'partly-cloudy-night-drizzle',  bg: 'drizzle' },
  53: { label: 'Drizzle',              icon: 'drizzle',                                                                bg: 'drizzle' },
  55: { label: 'Heavy Drizzle',        icon: 'drizzle',                                                                bg: 'drizzle' },
  56: { label: 'Freezing Drizzle',     icon: 'sleet',                                                                  bg: 'freezing-rain' },
  57: { label: 'Freezing Drizzle',     icon: 'sleet',                                                                  bg: 'freezing-rain' },
  61: { label: 'Light Rain',           icon: 'partly-cloudy-day-rain',     icon_night: 'partly-cloudy-night-rain',     bg: 'rain-light' },
  63: { label: 'Rain',                 icon: 'rain',                                                                   bg: 'rain' },
  65: { label: 'Heavy Rain',           icon: 'extreme-rain',                                                           bg: 'rain-heavy' },
  66: { label: 'Freezing Rain',        icon: 'sleet',                                                                  bg: 'freezing-rain' },
  67: { label: 'Freezing Rain',        icon: 'sleet',                                                                  bg: 'freezing-rain' },
  71: { label: 'Light Snow',           icon: 'partly-cloudy-day-snow',     icon_night: 'partly-cloudy-night-snow',     bg: 'snow-light' },
  73: { label: 'Snow',                 icon: 'snow',                                                                   bg: 'snow' },
  75: { label: 'Heavy Snow',           icon: 'extreme-snow',                                                           bg: 'snow-heavy' },
  77: { label: 'Snow Grains',          icon: 'snowflake',                                                              bg: 'snow' },
  80: { label: 'Light Showers',        icon: 'partly-cloudy-day-rain',     icon_night: 'partly-cloudy-night-rain',     bg: 'rain-light' },
  81: { label: 'Showers',              icon: 'rain',                                                                   bg: 'rain' },
  82: { label: 'Heavy Showers',        icon: 'extreme-rain',                                                           bg: 'rain-heavy' },
  85: { label: 'Snow Showers',         icon: 'partly-cloudy-day-snow',     icon_night: 'partly-cloudy-night-snow',     bg: 'snow' },
  86: { label: 'Heavy Snow Showers',   icon: 'extreme-snow',                                                           bg: 'snow-heavy' },
  95: { label: 'Thunderstorm',         icon: 'thunderstorms',                                                          bg: 'thunderstorm' },
  96: { label: 'Thunderstorm + Hail',  icon: 'thunderstorms-extreme',                                                  bg: 'thunderstorm' },
  99: { label: 'Severe Thunderstorm',  icon: 'thunderstorms-extreme',                                                  bg: 'thunderstorm' },
};

// Pick the right icon name based on is_day flag
function iconNameFor(wx, isDay) {
  if (!isDay && wx.icon_night) return wx.icon_night;
  return wx.icon;
}

// Build the full URL for an icon
function iconUrl(name) {
  return `${ICON_BASE}/${name}.svg`;
}

// Background images per bucket (Unsplash placeholders, swap with your own)
const BG_IMAGES = {
  'sunny':         'https://images.unsplash.com/photo-1601297183305-6df142704ea2?w=2400&q=80',
  'cloudy':        'https://images.unsplash.com/photo-1499346030926-9a72daac6c63?w=2400&q=80',
  'fog':           'https://images.unsplash.com/photo-1487621167305-5d248087c724?w=2400&q=80',
  'drizzle':       'https://images.unsplash.com/photo-1438449805896-28a666819a20?w=2400&q=80',
  'rain-light':    'https://images.unsplash.com/photo-1519692933481-e162a57d6721?w=2400&q=80',
  'rain':          'https://images.unsplash.com/photo-1428592953211-077101b2021b?w=2400&q=80',
  'rain-heavy':    'https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?w=2400&q=80',
  'freezing-rain': 'https://images.unsplash.com/photo-1457269449834-928af64c684d?w=2400&q=80',
  'snow-light':    'https://images.unsplash.com/photo-1547500818-faecf76e5a64?w=2400&q=80',
  'snow':          'https://images.unsplash.com/photo-1518931412505-5c6c5a02a89c?w=2400&q=80',
  'snow-heavy':    'https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=2400&q=80',
  'thunderstorm':  'https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?w=2400&q=80',
};

async function loadWeather() {
  try {
    const url = `https://api.open-meteo.com/v1/forecast`
      + `?latitude=${LAT}&longitude=${LON}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,`
      + `weather_code,wind_speed_10m,wind_direction_10m,precipitation,is_day`
      + `&hourly=temperature_2m,weather_code,precipitation_probability`
      + `&forecast_days=2`
      + `&timezone=America%2FVancouver`;

    const res = await fetch(url);
    const data = await res.json();
    render(data);
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    console.error('Weather load failed:', e);
    document.getElementById('loading').textContent = 'Unable to load weather.';
  }
}

function render(data) {
  const c = data.current;
  const code = c.weather_code;
  const isDay = !!c.is_day;
  const wx = WX[code] || { label: 'Conditions', icon: 'cloudy', bg: 'cloudy' };

  // Background
  const bgUrl = BG_IMAGES[wx.bg] || BG_IMAGES['cloudy'];
  document.getElementById('bg').style.backgroundImage = `url('${bgUrl}')`;

  // Temp + condition
  document.getElementById('temp').innerHTML =
    `${Math.round(c.temperature_2m)}<span class="unit">°C</span>`;
  document.getElementById('icon-wrap').innerHTML =
    `<img src="${iconUrl(iconNameFor(wx, isDay))}" alt="">`;
  document.getElementById('condition').textContent = wx.label;

  // Pills — floating, not a panel
  const windDir = degreesToCompass(c.wind_direction_10m);
  document.getElementById('pills').innerHTML = `
    <div class="pill">
      <div class="pill-label">Feels Like</div>
      <div class="pill-value">${Math.round(c.apparent_temperature)}<span class="small">°C</span></div>
    </div>
    <div class="pill">
      <div class="pill-label">Humidity</div>
      <div class="pill-value">${Math.round(c.relative_humidity_2m)}<span class="small">%</span></div>
    </div>
    <div class="pill">
      <div class="pill-label">Wind</div>
      <div class="pill-value">${Math.round(c.wind_speed_10m)}<span class="small"> km/h ${windDir}</span></div>
    </div>
    <div class="pill">
      <div class="pill-label">Precipitation</div>
      <div class="pill-value">${(c.precipitation || 0).toFixed(1)}<span class="small"> mm</span></div>
    </div>
  `;

  // Hourly strip
  const now = new Date();
  const hourly = data.hourly;
  const times = hourly.time;
  let startIdx = 0;
  for (let i = 0; i < times.length; i++) {
    if (new Date(times[i]) >= now) { startIdx = i; break; }
  }
  const slice = times.slice(startIdx, startIdx + 12);
  let html = '';
  for (let i = 0; i < slice.length; i++) {
    const idx = startIdx + i;
    const t = new Date(times[idx]);
    const hourWx = WX[hourly.weather_code[idx]] || { icon: 'cloudy' };
    // Use day icon if hour is between 6am-8pm, else night icon (rough but OK without dawn/dusk data)
    const hourIsDay = t.getHours() >= 6 && t.getHours() < 20;
    const pop = hourly.precipitation_probability[idx];
    html += `
      <div class="hour">
        <div class="h-time">${t.toLocaleTimeString('en-CA', {hour: 'numeric'})}</div>
        <div class="h-icon"><img src="${iconUrl(iconNameFor(hourWx, hourIsDay))}" alt=""></div>
        <div class="h-temp">${Math.round(hourly.temperature_2m[idx])}°</div>
        ${pop >= 20 ? `<div class="h-rain">${pop}%</div>` : ''}
      </div>
    `;
  }
  document.getElementById('hourly').innerHTML = html;
}

function degreesToCompass(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
}

loadWeather();
updateClock();
setInterval(loadWeather, RELOAD_MS);
setInterval(updateClock, 30000);
</script>
</body>
</html>
